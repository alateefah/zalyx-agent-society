  <text x="260" y="89" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">⚙️ Express API</text>
  <text x="260" y="105" text-anchor="middle" fill="#64748b" font-size="10">Node.js · SSE stream</text>

