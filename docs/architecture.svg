<svg viewBox="0 0 1060 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Zalyx Agent Society — Architecture Diagram</title>
  <desc>Five-agent debate pipeline with MCP server, powered by Qwen Cloud</desc>
  <rect width="1060" height="660" fill="#0f1117"/>
  <text x="530" y="28" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Zalyx Agent Society — Architecture</text>
  <text x="530" y="46" text-anchor="middle" fill="#64748b" font-size="11">Multi-Agent Merchant Underwriting · Qwen Cloud Hackathon Track 3 · MCP Integration</text>

  <!-- Browser -->
  <rect x="20" y="72" width="130" height="50" rx="10" fill="#1a1d27" stroke="#3d4166" stroke-width="1.5"/>
  <text x="85" y="93" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">🌐 Browser</text>
  <text x="85" y="109" text-anchor="middle" fill="#64748b" font-size="10">React + Vite UI</text>

  <!-- ECS boundary -->
