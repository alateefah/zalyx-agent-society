  <text x="260" y="177" text-anchor="middle" fill="#64748b" font-size="10">Routes · Debate logic</text>

  <!-- Agents column -->
  <!-- Data Quality -->
  <rect x="390" y="82" width="210" height="44" rx="9" fill="#1a1d27" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="390" y="82" width="6" height="44" rx="3" fill="#6366f1"/>
  <text x="502" y="100" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">🔍 Data Quality Agent</text>
  <text x="502" y="116" text-anchor="middle" fill="#64748b" font-size="9.5">Completeness · Anomaly detection</text>

  <!-- Business Analysis -->
  <rect x="390" y="144" width="210" height="44" rx="9" fill="#1a1d27" stroke="#10b981" stroke-width="1.5"/>
  <rect x="390" y="144" width="6" height="44" rx="3" fill="#10b981"/>
  <text x="502" y="162" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">📈 Business Analysis Agent</text>
  <text x="502" y="178" text-anchor="middle" fill="#64748b" font-size="9.5">Health score · Revenue trajectory</text>

  <!-- Debate box -->
  <rect x="378" y="200" width="234" height="148" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="495" y="216" text-anchor="middle" fill="#f59e0b" font-size="9.5" font-weight="700" opacity="0.9">⚔️ DEBATE ROUND (conditional)</text>

