<svg viewBox="0 0 1120 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Zalyx Agent Society - System Architecture</title>
  <desc>System architecture for the Zalyx Agent Society deployment: React UI and Express API on Alibaba Cloud ECS, five-agent orchestration, Qwen Cloud chat completions, MCP tools, and Alibaba Cloud Tablestore persistence.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>

    <style>
      .title { fill: #111827; font-size: 22px; font-weight: 750; }
      .subtitle { fill: #64748b; font-size: 12px; }
      .eyebrow { fill: #475569; font-size: 10px; font-weight: 700; letter-spacing: 0; }
      .box-title { fill: #111827; font-size: 14px; font-weight: 750; }
      .box-subtitle { fill: #475569; font-size: 11px; }
      .small { fill: #64748b; font-size: 10px; }
      .tiny { fill: #7a8797; font-size: 9px; }
      .label { fill: #1f2937; font-size: 10px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1120" height="700" fill="#f7f9fb"/>

  <text x="560" y="38" text-anchor="middle" class="title">Zalyx Agent Society - System Architecture</text>
  <text x="560" y="58" text-anchor="middle" class="subtitle">Live ECS app: http://139.129.19.5:3001/ - Health: /api/health - Qwen mock=false - Tablestore mock=false</text>

  <!-- User/browser -->
  <rect x="34" y="118" width="160" height="92" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="1.6"/>
  <text x="114" y="145" text-anchor="middle" class="box-title">Underwriter</text>
  <text x="114" y="165" text-anchor="middle" class="box-subtitle">Browser</text>
  <text x="114" y="185" text-anchor="middle" class="small">React + Vite UI</text>
  <text x="114" y="199" text-anchor="middle" class="tiny">merchant workspaces</text>

  <!-- ECS boundary -->
  <rect x="250" y="92" width="564" height="548" rx="14" fill="none" stroke="#c2410c" stroke-width="2" stroke-dasharray="9,6"/>
  <text x="270" y="116" class="eyebrow">ALIBABA CLOUD ECS - DOCKER IMAGE</text>

  <!-- Express/API -->
  <rect x="292" y="142" width="204" height="96" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="394" y="169" text-anchor="middle" class="box-title">Express API</text>
  <text x="394" y="188" text-anchor="middle" class="box-subtitle">Node.js + TypeScript</text>
  <text x="394" y="207" text-anchor="middle" class="small">REST, SSE, health</text>
  <text x="394" y="222" text-anchor="middle" class="tiny">serves frontend/dist via process.cwd()</text>

  <!-- Orchestrator -->
  <rect x="564" y="142" width="204" height="96" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="666" y="169" text-anchor="middle" class="box-title">Agent Orchestrator</text>
  <text x="666" y="188" text-anchor="middle" class="box-subtitle">5-agent pipeline</text>
  <text x="666" y="207" text-anchor="middle" class="small">parallel stages + debate gate</text>
  <text x="666" y="222" text-anchor="middle" class="tiny">baseline comparison + observability</text>

  <!-- Agents -->
  <rect x="292" y="294" width="476" height="216" rx="10" fill="#ffffff" stroke="#cbd5df" stroke-width="1.4"/>
  <text x="530" y="320" text-anchor="middle" class="eyebrow">AGENT SOCIETY FLOW</text>

  <rect x="316" y="344" width="136" height="54" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="384" y="365" text-anchor="middle" class="label">Data Quality</text>
  <text x="384" y="382" text-anchor="middle" class="tiny">CBN compliance</text>

  <rect x="472" y="344" width="136" height="54" rx="7" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.1"/>
  <text x="540" y="365" text-anchor="middle" class="label">Business Analysis</text>
  <text x="540" y="382" text-anchor="middle" class="tiny">sector benchmarks</text>

  <rect x="632" y="344" width="112" height="54" rx="7" fill="#fffbeb" stroke="#b45309" stroke-width="1.1"/>
  <text x="688" y="365" text-anchor="middle" class="label">Risk Review</text>
  <text x="688" y="382" text-anchor="middle" class="tiny">default rates</text>

  <rect x="348" y="428" width="144" height="54" rx="7" fill="#fffbeb" stroke="#b45309" stroke-width="1.1" stroke-dasharray="5,3"/>
  <text x="420" y="449" text-anchor="middle" class="label">Conditional Debate</text>
  <text x="420" y="466" text-anchor="middle" class="tiny">rebuttal + verdict</text>

  <rect x="512" y="428" width="132" height="54" rx="7" fill="#f8fafc" stroke="#475569" stroke-width="1.1"/>
  <text x="578" y="449" text-anchor="middle" class="label">Murabaha Terms</text>
  <text x="578" y="466" text-anchor="middle" class="tiny">GTV affordability cap</text>

  <rect x="660" y="428" width="84" height="54" rx="7" fill="#f8fafc" stroke="#64748b" stroke-width="1.1"/>
  <text x="702" y="449" text-anchor="middle" class="label">Review</text>
  <text x="702" y="466" text-anchor="middle" class="tiny">decision</text>

  <!-- MCP -->
  <rect x="292" y="548" width="204" height="68" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
  <text x="394" y="573" text-anchor="middle" class="box-title">MCP Server</text>
  <text x="394" y="592" text-anchor="middle" class="box-subtitle">stdio transport</text>
  <text x="394" y="607" text-anchor="middle" class="tiny">compliance, benchmarks, default rates</text>

  <!-- Local fallback -->
  <rect x="564" y="548" width="204" height="68" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="666" y="573" text-anchor="middle" class="box-title">Local Fallback</text>
  <text x="666" y="592" text-anchor="middle" class="box-subtitle">no OTS_* credentials</text>
  <text x="666" y="607" text-anchor="middle" class="tiny">snapshots + decisions.local.json</text>

  <!-- External services -->
  <rect x="884" y="120" width="196" height="132" rx="9" fill="#fff7ed" stroke="#c2410c" stroke-width="1.7"/>
  <text x="982" y="149" text-anchor="middle" class="box-title">Qwen Cloud</text>
  <text x="982" y="169" text-anchor="middle" class="box-subtitle">DashScope-compatible</text>
  <text x="982" y="190" text-anchor="middle" class="small">chat completions</text>
  <text x="982" y="206" text-anchor="middle" class="small">typed tool calls</text>
  <text x="982" y="226" text-anchor="middle" class="tiny">qwen-max via utils/qwen-client.ts</text>

  <rect x="884" y="336" width="196" height="148" rx="9" fill="#ecfdf5" stroke="#15803d" stroke-width="1.7"/>
  <text x="982" y="365" text-anchor="middle" class="box-title">Alibaba Cloud Tablestore</text>
  <text x="982" y="385" text-anchor="middle" class="box-subtitle">instance: zalyx-agent-db</text>
  <text x="982" y="408" text-anchor="middle" class="small">zalyx_merchants</text>
  <text x="982" y="426" text-anchor="middle" class="small">zalyx_decisions</text>
  <text x="982" y="446" text-anchor="middle" class="tiny">decision_index: decision + createdAt</text>
  <text x="982" y="464" text-anchor="middle" class="tiny">utils/tablestore.ts</text>

  <!-- API arrows -->
  <line x1="194" y1="164" x2="290" y2="184" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="238" y="159" text-anchor="middle" class="small" fill="#0f766e">REST + SSE</text>
  <line x1="496" y1="190" x2="562" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="666" y1="238" x2="666" y2="292" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="510" x2="448" y2="548" stroke="#0f766e" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-teal)"/>
  <line x1="394" y1="548" x2="394" y2="240" stroke="#0f766e" stroke-width="1.4" stroke-dasharray="5,4" opacity="0.65"/>

  <!-- Service arrows -->
  <line x1="768" y1="190" x2="882" y2="186" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <text x="824" y="174" text-anchor="middle" class="small" fill="#c2410c">Qwen calls</text>
  <line x1="768" y1="410" x2="882" y2="410" stroke="#15803d" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="824" y="397" text-anchor="middle" class="small" fill="#15803d">merchant + decision writes</text>
  <line x1="666" y1="510" x2="666" y2="548" stroke="#64748b" stroke-width="1.7" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- Return path -->
  <path d="M 292 222 C 256 250, 224 232, 194 198" fill="none" stroke="#0f766e" stroke-width="1.8" marker-end="url(#arrow-teal)"/>
  <text x="244" y="248" text-anchor="middle" class="small" fill="#0f766e">streamed progress</text>

  <!-- Legend -->
  <rect x="34" y="660" width="1046" height="24" rx="5" fill="#ffffff" stroke="#dde3ea"/>
  <line x1="54" y1="672" x2="88" y2="672" stroke="#0f766e" stroke-width="2"/>
  <text x="96" y="675" class="tiny">REST/SSE and MCP</text>
  <line x1="210" y1="672" x2="244" y2="672" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="252" y="675" class="tiny">Qwen Cloud tool calls</text>
  <line x1="408" y1="672" x2="442" y2="672" stroke="#15803d" stroke-width="2"/>
  <text x="450" y="675" class="tiny">Tablestore persistence</text>
  <line x1="620" y1="672" x2="654" y2="672" stroke="#64748b" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="662" y="675" class="tiny">local fallback / optional path</text>
</svg>
